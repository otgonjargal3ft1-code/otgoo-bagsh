<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Санхүүгийн зах зээл - Тест</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; width: 90%; max-width: 450px; padding: 30px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 85%; padding: 12px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1.1rem; text-align: center; outline: none; }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); width: 0%; transition: 0.5s; }
        .option-btn { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .correct { background: var(--success) !important; color: white !important; }
        .wrong { background: var(--error) !important; color: white !important; }
        .hidden { display: none; }
        .btn-main { padding: 14px 30px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h2>Санхүүгийн зах зээл</h2>
        <p>Та овог нэрээ бичнэ үү</p>
        <input type="text" id="student-name" placeholder="Овог Нэр..." required>
        <button class="btn-main" onclick="startGame()">ТОГЛООМЫГ ЭХЛЭХ</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="q-text" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;"></div>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Үр дүн 🏆</h2>
        <h1 id="final-score" style="font-size: 4rem; color: var(--primary); margin: 10px 0;">0</h1>
        <p id="student-display" style="font-weight: bold;"></p>
        <button type="button" id="send-btn" class="btn-main" style="background: #10b981;" onclick="submitScore()">БАГШИД ОНООГОО ИЛГЭЭХ</button>
        <p id="status-msg" style="margin-top: 15px; font-weight: bold;"></p>
    </div>
</div>

<script>
    const FORMSPREE_URL = "https://formspree.io/f/xzdoozqn"; 

    const questions = [
        { q: "1 жилээс дээш хугацаатай хөрөнгө оруулалт хийгддэг зах зээл?", o: ["Мөнгөний зах зээл", "Хөрөнгийн зах зээл", "Валютын зах зээл"], a: 1 },
        { q: "Компаниуд шинээр үнэт цаас гаргаж, хөрөнгө босгох үйл явц?", o: ["Анхдагч зах зээл", "Хоёрдогч зах зээл", "Биржийн бус"], a: 0 },
        { q: "Засгийн газрын үнэт цаас болон Репо хэлцэл аль зах зээлд хамаарах вэ?", o: ["Хөрөнгийн зах зээл", "Валютын зах зээл", "Мөнгөний зах зээл"], a: 2 },
        { q: "Хөрөнгө оруулагч болон гаргагчийг холбох 'Гүүр' нь хэн бэ?", o: ["Иргэд", "Санхүүгийн зуучлагчид", "Засгийн газар"], a: 1 },
        { q: "Үнэт цаасыг буцаагаад бэлэн мөнгө болгох боломжийг хангадаг зах зээл?", o: ["Анхдагч зах зээл", "Хоёрдогч зах зээл", "Мөнгөний зах зээл"], a: 1 }
    ];

    let current = 0, score = 0, studentName = "";

    function startGame() {
        studentName = document.getElementById("student-name").value;
        if (!studentName.trim()) return alert("Нэрээ бичнэ үү!");
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");
        loadQ();
    }

    function loadQ() {
        const q = questions[current];
        document.getElementById("q-text").innerText = q.q;
        document.getElementById("progress-fill").style.width = `${((current + 1) / 5) * 100}%`;
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        q.o.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.className = "option-btn";
            btn.onclick = () => {
                if (i === q.a) { btn.classList.add("correct"); score += 20; }
                else { btn.classList.add("wrong"); }
                document.querySelectorAll(".option-btn").forEach(b => b.disabled = true);
                setTimeout(() => {
                    current++;
                    if (current < 5) loadQ();
                    else showResult();
                }, 1000);
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.remove("hidden");
        document.getElementById("final-score").innerText = score;
        document.getElementById("student-display").innerText = `Сурагч: ${studentName}`;
    }

    async function submitScore() {
        const btn = document.getElementById("send-btn");
        const status = document.getElementById("status-msg");
        btn.disabled = true;
        btn.innerText = "Илгээж байна...";

        const formData = new URLSearchParams();
        formData.append("StudentName", studentName);
        formData.append("Score", score + "/100");

        try {
            await fetch(FORMSPREE_URL, {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
            status.innerText = "✅ Амжилттай илгээгдлээ!";
            status.style.color = "var(--success)";
            btn.style.display = "none";
        } catch (e) {
            status.innerText = "❌ Алдаа гарлаа.";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
