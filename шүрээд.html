<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шүрээгийн Тооны Аялал 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --princess-pink: #ffb6c1; /* Цайвар ягаан */
            --princess-dark-pink: #ff69b4; /* Тод ягаан */
            --princess-purple: #e6e6fa; /* Хөх ягаан */
            --gold: #ffd700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; user-select: none; }
        body { background-color: #fff0f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        
        /* Үндсэн тоглоомын хүрээ */
        .game-container {
            width: 100%;
            max-width: 600px;
            height: 570px;
            background-color: var(--princess-purple);
            background-image: radial-gradient(#fff 20%, transparent 20%), radial-gradient(#fff 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border: 6px solid var(--princess-dark-pink);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 12px 35px rgba(255, 105, 180, 0.3);
        }

        /* Хамгийн дээд талын тусгай гарчиг */
        .dedication-bar {
            background: var(--princess-dark-pink);
            color: white;
            text-align: center;
            padding: 6px;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        /* Онооны хэсэг */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.85);
            font-size: 1.1rem;
            font-weight: 800;
            border-bottom: 2px solid var(--princess-pink);
            color: var(--princess-dark-pink);
        }

        .heart { color: #ff4d6d; font-size: 1.3rem; }

        /* Дэлгэцүүд */
        .screen { display: none; height: calc(100% - 95px); flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .screen.active { display: flex; }

        /* Бодлогын хайрцаг - Гүнжийн Тэргэн загвартай */
        .mario-box {
            background: #fff;
            border: 4px solid var(--princess-dark-pink);
            box-shadow: 0 8px 0px var(--princess-pink), 0 12px 20px rgba(0,0,0,0.1);
            padding: 25px 40px;
            border-radius: 20px;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--princess-dark-pink);
            animation: float 1.5s infinite alternate ease-in-out;
        }

        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-8px); } }

        /* Хариултын товчлуур хэсэг */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn-answer {
            background: linear-gradient(135deg, #fff, var(--princess-pink));
            color: #d81b60;
            border: 3px solid var(--princess-dark-pink);
            border-radius: 16px;
            padding: 12px;
            font-size: 2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 0px var(--princess-dark-pink), 0 8px 10px rgba(0,0,0,0.1);
            transition: all 0.1s;
        }
        .btn-answer:active { transform: translateY(4px); box-shadow: 0 1px 0px var(--princess-dark-pink); }

        /* 2. ШАГНАЛТ ГҮНЖИЙН ТОГЛООМ */
        #bonus-screen { background: #ffe4e1; position: relative; overflow: hidden; }
        
        /* Шидэт нуга, цэцэгт шал */
        .mario-floor { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: #ffc0cb; border-top: 4px solid var(--princess-dark-pink); }
        
        /* Хөөрхөн Гүнж бөмбөлөг */
        .mario-character {
            width: 65px;
            height: 65px;
            background: #fff;
            border: 3px solid var(--princess-dark-pink);
            border-radius: 50%;
            position: absolute;
            bottom: 40px;
            left: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: bottom 0.15s ease-out;
        }
        .mario-character::after { content: '👸'; } /* Гүнж эможи */

        /* Дээгүүр нисэх шидэт шагнал */
        .bonus-item {
            width: 55px;
            height: 55px;
            background: #fff;
            border: 3px solid var(--gold);
            border-radius: 50%;
            position: absolute;
            top: 110px;
            right: -60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 10px rgba(255,215,0,0.4);
        }

        /* Үсрэх шидэт дохиур товчлуур */
        .btn-jump {
            position: absolute;
            bottom: 60px;
            right: 20px;
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, var(--princess-dark-pink), #ff1493);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #c2185b, 0 8px 15px rgba(0,0,0,0.2);
        }
        .btn-jump:active { transform: translateY(4px); box-shadow: 0 1px 0 #c2185b; }

        .bonus-instruction { position: absolute; top: 60px; width: 100%; text-align: center; color: var(--princess-dark-pink); font-size: 1.25rem; font-weight: 800; text-shadow: 1px 1px 1px #fff; }

        /* Төгсгөлийн дэлгэцүүд */
        .result-title { font-size: 2.6rem; color: var(--princess-dark-pink); text-shadow: 2px 2px 0px #fff; margin-bottom: 20px; }
        .btn-restart { background: var(--princess-dark-pink); color: #fff; padding: 14px 28px; border-radius: 20px; font-size: 1.3rem; font-weight: 800; cursor: pointer; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="game-container">
    <div class="dedication-bar">✨ ШҮРЭЭД ЗОРИУЛАВ 👑 ✨</div>

    <div class="scoreboard">
        <div>ОНОО: <span id="score-val" style="color: #ff1493;">0</span> ⭐</div>
        <div>АМЬ: <span id="hearts-val">❤️❤️❤️</span></div>
    </div>

    <div id="start-screen" class="screen active">
        <h1 class="result-title">ГҮНЖИЙН ТООНЫ АЯЛАЛ</h1>
        <p style="margin-bottom: 30px; font-weight: 700; color: #d81b60;">Зөв бодвол Гүнж үсэрч шидэт бэлэг авна! 👸✨</p>
        <button class="btn-restart" onclick="startGame()">ТОГЛОХЫГ ЭХЛЭХ 💖</button>
    </div>

    <div id="math-screen" class="screen">
        <div class="mario-box" id="question-text">3 + 2</div>
        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="bonus-screen" class="screen">
        <div class="bonus-instruction">ҮСЭРЧ ШИДЭТ БЭЛГИЙГ ОНООРОЙ ШҮРЭЭ! 👑</div>
        <div class="bonus-item" id="bonus-star">👑</div>
        <div class="mario-character" id="mario-player"></div>
        <div class="mario-floor"></div>
        <button class="btn-jump" onclick="marioJump()">ҮСЭР! ✨</button>
    </div>

    <div id="over-screen" class="screen">
        <h1 class="result-title" id="game-result-title">ТОГЛООМ ДУУСЛАА</h1>
        <p style="font-size: 1.4rem; margin-bottom: 25px; color: #555;">Шүрээгийн цуглуулсан оноо: <b id="final-score" style="color:var(--princess-dark-pink);">0</b></p>
        <button class="btn-restart" onclick="startGame()">ДАХИН ТОГЛОХ 🔄</button>
    </div>
</div>

<script>
    let score = 0;
    let lives = 3;
    let correctAnswer = 0;
    let isJumping = false;
    let bonusActive = false;
    let itemInterval;

    function startGame() {
        score = 0;
        lives = 3;
        document.getElementById('score-val').innerText = score;
        updateHearts();
        showScreen('math-screen');
        nextQuestion();
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function updateHearts() {
        let txt = '';
        for(let i=0; i<lives; i++) txt += '💖';
        if(txt === '') txt = '💔';
        document.getElementById('hearts-val').innerText = txt;
    }

    function nextQuestion() {
        let num1 = Math.floor(Math.random() * 7) + 1;
        let num2 = Math.floor(Math.random() * 7) + 1;
        let isPlus = Math.random() > 0.4; 

        if (!isPlus) {
            if (num1 < num2) {
                let temp = num1;
                num1 = num2;
                num2 = temp;
            }
            correctAnswer = num1 - num2;
            document.getElementById('question-text').innerText = `${num1} - ${num2} = ?`;
        } else {
            while(num1 + num2 > 10) {
                num1 = Math.floor(Math.random() * 6) + 1;
                num2 = Math.floor(Math.random() * 4) + 1;
            }
            correctAnswer = num1 + num2;
            document.getElementById('question-text').innerText = `${num1} + ${num2} = ?`;
        }

        let answers = [correctAnswer];
        while (answers.length < 4) {
            let wrong = Math.floor(Math.random() * 11);
            if (!answers.includes(wrong)) answers.push(wrong);
        }

        answers.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        answers.forEach(ans => {
            const btn = document.createElement('button');
            btn.className = 'btn-answer';
            btn.innerText = ans;
            btn.onclick = () => checkAnswer(ans);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        if (selected === correctAnswer) {
            score += 10;
            document.getElementById('score-val').innerText = score;
            startBonusGame();
        } else {
            lives--;
            updateHearts();
            if (lives <= 0) {
                endGame();
            } else {
                alert("ӨӨ, БУРУУ БАЙНА ХӨӨРХӨН ШҮРЭЭ! ДАХИН НЭГ ОРОЛДООД ҮЗЭЭРЭЙ! 💕");
                nextQuestion();
            }
        }
    }

    function startBonusGame() {
        showScreen('bonus-screen');
        bonusActive = true;
        
        const item = document.getElementById('bonus-star');
        // Гүнжийн дуртай шидэт бэлгүүд солигдоно
        const princessGifts = ['👑', '⭐', '🎈', '🍭', '🦄', '🎀'];
        item.innerText = princessGifts[Math.floor(Math.random() * princessGifts.length)];
        
        let itemX = 550;
        item.style.right = '-60px';
        item.style.left = 'auto';

        clearInterval(itemInterval);
        itemInterval = setInterval(() => {
            if(!bonusActive) return;
            itemX -= 6; 
            item.style.left = itemX + 'px';

            const mario = document.getElementById('mario-player');
            let marioBottom = parseInt(window.getComputedStyle(mario).bottom);
            
            if (itemX > 50 && itemX < 110 && marioBottom > 120) {
                bonusActive = false;
                clearInterval(itemInterval);
                score += 5; 
                document.getElementById('score-val').innerText = score;
                
                mario.style.transform = 'scale(1.3)';
                alert("МУНДАГ БАЙНА ШҮРЭЭ! БЭЛГЭЭ ОНОЛОО! 🦄✨ (+5 ОНОО)");
                
                setTimeout(() => {
                    mario.style.transform = 'scale(1)';
                    showScreen('math-screen');
                    nextQuestion();
                }, 1000);
            }

            if (itemX < -50) {
                bonusActive = false;
                clearInterval(itemInterval);
                alert("АЙДАА, БЭЛГЭЭ АЛДЧИХЛАА! ДАРААГИЙН УДАА ИЛҮҮ ХУРДАН ҮСРЭЭРЭЙ! 🌸");
                showScreen('math-screen');
                nextQuestion();
            }
        }, 20);
    }

    function marioJump() {
        if (isJumping) return;
        isJumping = true;
        const mario = document.getElementById('mario-player');
        
        mario.style.bottom = '160px';
        
        setTimeout(() => {
            mario.style.bottom = '40px';
            setTimeout(() => { isJumping = false; }, 150);
        }, 250);
    }

    function endGame() {
        clearInterval(itemInterval);
        showScreen('over-screen');
        document.getElementById('final-score').innerText = score;
        
        if(score >= 80) {
            document.getElementById('game-result-title').innerText = "ҮНЭХЭЭР МУНДАГ ГҮНЖ ЮМ АА! 🎉💖";
        } else {
            document.getElementById('game-result-title').innerText = "ТОГЛООМ ДУУСЛАА 👑";
        }
    }
</script>

</body>
</html>
